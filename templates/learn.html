{% extends "base.html" %}
{% block title %}Learn — Aptutor{% endblock %}

{% block extra_css %}
<style>
  /* Level cards */
  .level-section { margin-bottom: 40px; }
  .level-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
    padding: 18px 22px; border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .level-header.success { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.2); }
  .level-header.accent  { background: rgba(61,127,255,0.06); border-color: rgba(61,127,255,0.2); }
  .level-header.warning { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.2); }
  .level-icon { font-size: 32px; }
  .level-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
  .level-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .level-badge { margin-left: auto; }

  /* Lesson cards */
  .lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .lesson-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; cursor: pointer;
    transition: all 0.22s; position: relative; overflow: hidden;
  }
  .lesson-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .lesson-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); transform: scaleX(0); transition: transform 0.22s;
  }
  .lesson-card:hover::before { transform: scaleX(1); }
  .lesson-card.done { border-color: rgba(34,197,94,0.3); }
  .lesson-card.done::before { background: var(--success); transform: scaleX(1); }
  .lesson-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
  .lesson-meta { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .lesson-duration { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .lesson-topics { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .lesson-formula {
    margin-top: 12px; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    font-family: var(--font-mono); font-size: 12px; color: var(--accent-bright);
  }
  .lesson-start-btn {
    margin-top: 14px; width: 100%;
    background: var(--accent); color: white;
    border: none; border-radius: 6px; padding: 9px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.18s;
  }
  .lesson-start-btn:hover { background: var(--accent-bright); }
  .lesson-start-btn.done-btn { background: var(--success); }

  /* Daily lecture */
  .lecture-card {
    background: linear-gradient(135deg, rgba(61,127,255,0.1), rgba(34,197,94,0.06));
    border: 1px solid rgba(61,127,255,0.25); border-radius: var(--radius-lg);
    padding: 28px; margin-bottom: 32px; position: relative; overflow: hidden;
  }
  .lecture-card::after {
    content: '📚'; position: absolute; right: 24px; top: 20px; font-size: 48px; opacity: 0.15;
  }
  .lecture-eyebrow {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
    color: var(--accent-bright); text-transform: uppercase; margin-bottom: 8px;
  }
  .lecture-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .lecture-hook { font-size: 14px; color: var(--text-muted); margin-bottom: 18px; font-style: italic; }
  .lecture-body {
    font-size: 14px; line-height: 1.75; color: var(--text-secondary);
    background: var(--bg-card); border-radius: var(--radius-sm); padding: 16px;
    border: 1px solid var(--border); white-space: pre-line; display: none;
  }
  .lecture-body.visible { display: block; }
  .lecture-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  /* Illustration modal */
  .illus-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .illus-modal.open { display: flex; }
  .illus-box {
    background: var(--bg-secondary); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); padding: 32px; max-width: 640px; width: 100%;
    max-height: 90vh; overflow-y: auto; position: relative;
  }
  .illus-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-muted); width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .illus-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  svg.illustration { width: 100%; max-width: 500px; display: block; margin: 0 auto 20px; }

  /* Progress tracker */
  .progress-strip {
    display: flex; gap: 8px; align-items: center; margin-bottom: 28px; flex-wrap: wrap;
  }
  .prog-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);
  }
  .prog-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .prog-dot.done { background: var(--success); }
  .prog-dot.active { background: var(--accent); animation: dotPulse 1.5s infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }

  @media (max-width: 600px) {
    .lessons-grid { grid-template-columns: 1fr; }
    .lecture-card { padding: 20px; }
    .level-header { flex-wrap: wrap; }
  }
</style>
{% endblock %}

{% block content %}
<div class="flex-between mb-24">
  <div>
    <h1 class="page-title">📚 Learn</h1>
    <p class="page-subtitle">Structured lessons, daily lectures, and concept-first teaching</p>
  </div>
</div>

<!-- Today's Lecture -->
<div class="lecture-card" id="lectureCard">
  <div class="lecture-eyebrow">🔥 Today's 3-Minute Lecture</div>
  <div class="lecture-title" id="lectureTitle">Loading...</div>
  <div class="lecture-hook" id="lectureHook"></div>
  <div class="lecture-body" id="lectureBody"></div>
  <div class="lecture-actions">
    <button class="btn btn-primary" onclick="toggleLecture()">Read Now →</button>
    <button class="btn btn-secondary" id="lectureQuizBtn" style="display:none" onclick="startLectureQuiz()">Practice This →</button>
  </div>
</div>

<!-- Progress strip -->
<div class="progress-strip" id="progressStrip"></div>

<!-- Curriculum levels -->
<div id="curriculumContainer">
  <div style="text-align:center;padding:60px;color:var(--text-muted);">Loading curriculum...</div>
</div>

<!-- Illustration modal -->
<div class="illus-modal" id="illusModal">
  <div class="illus-box">
    <button class="illus-close" onclick="closeIllus()">✕</button>
    <div class="illus-title" id="illusTitle"></div>
    <div id="illusContent"></div>
    <div id="illusExplain" style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-top:16px;"></div>
    <div id="illusMnemonic" style="margin-top:12px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:12px;font-size:13px;color:var(--warning);"></div>
    <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;" id="illusActions"></div>
  </div>
</div>

<script>
let _curriculum = null;
let _doneLessons = JSON.parse(localStorage.getItem('aptutor_done_lessons') || '[]');
let _lectureQuestionId = null;

// ── Load lecture ──
async function loadLecture() {
  try {
    const res = await fetch('/api/daily-lecture');
    const data = await res.json();
    document.getElementById('lectureTitle').textContent = data.title || 'Daily Lecture';
    document.getElementById('lectureHook').textContent = data.hook || '';
    document.getElementById('lectureBody').textContent = data.content || '';
    if (data.quiz_question) {
      _lectureQuestionId = data.quiz_question;
      document.getElementById('lectureQuizBtn').style.display = '';
    }
  } catch(e) {
    document.getElementById('lectureTitle').textContent = 'The Elimination Method';
    document.getElementById('lectureHook').textContent = 'How to score 70% even on questions you don\'t know';
  }
}

function toggleLecture() {
  const body = document.getElementById('lectureBody');
  const btn = document.querySelector('.lecture-actions .btn-primary');
  const isVisible = body.classList.toggle('visible');
  btn.textContent = isVisible ? 'Collapse ↑' : 'Read Now →';
  if (isVisible && _lectureQuestionId) {
    document.getElementById('lectureQuizBtn').style.display = '';
  }
}

async function startLectureQuiz() {
  const res = await fetch('/test/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({module:'gmat', count:5, mode:'study', difficulty:'all'})
  });
  const d = await res.json();
  if (d.session_id) window.location.href = `/test/${d.session_id}`;
}

// ── Load curriculum ──
async function loadCurriculum() {
  try {
    const res = await fetch('/api/curriculum');
    _curriculum = await res.json();
    renderCurriculum(_curriculum.levels);
    renderProgressStrip(_curriculum.levels);
  } catch(e) {
    document.getElementById('curriculumContainer').innerHTML =
      '<p style="color:var(--danger)">Could not load curriculum.</p>';
  }
}

function renderProgressStrip(levels) {
  const strip = document.getElementById('progressStrip');
  const total = levels.reduce((s,l) => s + l.lessons.length, 0);
  const done = _doneLessons.length;
  strip.innerHTML = `
    <span class="prog-item"><span class="prog-dot done"></span> ${done} completed</span>
    <span style="color:var(--border);font-size:18px;">·</span>
    <span class="prog-item"><span class="prog-dot" style="background:var(--border)"></span> ${total - done} remaining</span>
    <span style="color:var(--border);font-size:18px;">·</span>
    <div class="progress-bar-wrap" style="flex:1;min-width:100px;">
      <div class="progress-bar-fill success" style="width:${total>0?Math.round(done/total*100):0}%"></div>
    </div>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);">${total>0?Math.round(done/total*100):0}%</span>
  `;
}

function renderCurriculum(levels) {
  const container = document.getElementById('curriculumContainer');
  container.innerHTML = levels.map(level => `
    <div class="level-section">
      <div class="level-header ${level.color}">
        <span class="level-icon">${level.icon}</span>
        <div>
          <div class="level-title">${level.title}</div>
          <div class="level-subtitle">${level.subtitle}</div>
        </div>
        <span class="level-badge badge badge-${level.color}">
          ${level.lessons.filter(l => _doneLessons.includes(l.id)).length}/${level.lessons.length} done
        </span>
      </div>
      <div class="lessons-grid">
        ${level.lessons.map(lesson => renderLessonCard(lesson)).join('')}
      </div>
    </div>
  `).join('');
}

function renderLessonCard(lesson) {
  const done = _doneLessons.includes(lesson.id);
  return `
    <div class="lesson-card ${done?'done':''}" id="card_${lesson.id}">
      <div class="lesson-title">${lesson.title}</div>
      <div class="lesson-meta">
        <span class="badge badge-muted">${lesson.duration}</span>
        ${done ? '<span class="badge badge-success">✓ Done</span>' : ''}
      </div>
      <div class="lesson-topics">${lesson.topics.slice(0,3).join(' · ')}</div>
      <div class="lesson-formula">${lesson.key_formula}</div>
      <button class="lesson-start-btn ${done?'done-btn':''}" onclick="openLesson('${lesson.id}')">
        ${done ? '↺ Review' : '▶ Start Lesson'}
      </button>
    </div>
  `;
}

function openLesson(lessonId) {
  if (!_curriculum) return;
  let lesson = null;
  for (const level of _curriculum.levels) {
    lesson = level.lessons.find(l => l.id === lessonId);
    if (lesson) break;
  }
  if (!lesson) return;

  document.getElementById('illusTitle').textContent = lesson.title;

  // Render SVG illustration
  const svg = getIllustration(lesson.illustration, lesson.title);
  document.getElementById('illusContent').innerHTML = svg;

  // Explain
  document.getElementById('illusExplain').innerHTML = `
    <strong>Example:</strong> ${lesson.example}<br><br>
    <strong>Key Formula:</strong> <code style="background:var(--bg-card);padding:3px 8px;border-radius:4px;font-family:var(--font-mono);color:var(--accent-bright)">${lesson.key_formula}</code>
  `;

  document.getElementById('illusMnemonic').innerHTML = `
    ⚡ <strong>Remember:</strong> ${lesson.mnemonic}
  `;

  document.getElementById('illusActions').innerHTML = `
    <button class="btn btn-primary" onclick="markDone('${lesson.id}');startPractice('${lesson.practice_topics[0]}')">
      ✓ Done — Practise Now →
    </button>
    <button class="btn btn-secondary" onclick="markDone('${lesson.id}')">Mark as Done</button>
    <button class="btn btn-secondary" onclick="askTutor('Teach me about ${lesson.title} in detail')">🤖 Ask AI Tutor</button>
  `;

  document.getElementById('illusModal').classList.add('open');
}

function closeIllus() {
  document.getElementById('illusModal').classList.remove('open');
}

function markDone(lessonId) {
  if (!_doneLessons.includes(lessonId)) {
    _doneLessons.push(lessonId);
    localStorage.setItem('aptutor_done_lessons', JSON.stringify(_doneLessons));
    showToast('Lesson marked as done! 🎉', 'success');
    renderCurriculum(_curriculum.levels);
    renderProgressStrip(_curriculum.levels);
  }
}

async function startPractice(topic) {
  closeIllus();
  const res = await fetch('/test/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({module:'gmat', count:5, mode:'study', difficulty:'easy'})
  });
  const d = await res.json();
  if (d.session_id) window.location.href = `/test/${d.session_id}`;
}

function askTutor(msg) {
  closeIllus();
  if (window.sendQuickMessage) sendQuickMessage(msg);
  else {
    const fab = document.getElementById('chatbotFab');
    if (fab) fab.click();
  }
}
